# yaml-language-server: $schema=bundle_config_schema.json
bundle:
  name: tsnpdcl_analytics

resources:
  jobs:
    tsnpdcl_pipeline:
      # The Databricks Pipeline
      name: tsnpdcl-end-to-end-pipeline

      email_notifications:
        on_success:
          - nileshkumar.patil@zemosolabs.com
        on_failure:
          - nileshkumar.patil@zemosolabs.com

      # Trigger when Lambda finishes sending all files and drops the success token
      trigger:
        file_arrival:
          url: s3://tsnpdcl-analytics-datalake-poc-local/trigger/

      # Sequential Medallion Workflow
      tasks:
        - task_key: bronze_ingestion
          notebook_task:
            notebook_path: ./etl/bronze.ipynb

        - task_key: silver_incremental_load
          depends_on:
            - task_key: bronze_ingestion
          notebook_task:
            notebook_path: ./etl/silver.ipynb

        - task_key: data_quality_checks
          depends_on:
            - task_key: silver_incremental_load
          notebook_task:
            notebook_path: ./tests/test_data_quality.ipynb

        - task_key: gold_batch_aggregation
          depends_on:
            - task_key: data_quality_checks
          notebook_task:
            notebook_path: ./etl/gold.ipynb

targets:
  dev:
    # Set default target. It will use ~/.databrickscfg for Auth securely
    default: true
  
  prod:
    # This explicitly maps to the --target prod executed by GitHub Actions
    workspace:
      host: https://adb-xxxxx.cloud.databricks.com # The CI/CD engine securely injects the prod host via ENV Variables

